<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>의류벤더 용어 타자 연습</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: linear-gradient(180deg, #eef4ff 0%, #f8fafc 100%);
    color: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 1080px;
    max-width: 100%;
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid #dbe4f0;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
  }
  .header {
    background: #0f172a;
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .title-wrap h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.2;
  }
  .title-wrap p {
    margin: 6px 0 0;
    color: #cbd5e1;
    font-size: 14px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(6, minmax(88px, 1fr));
    gap: 10px;
    width: min(100%, 640px);
  }
  .stat {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .stat .label {
    display: block;
    font-size: 12px;
    color: #cbd5e1;
    margin-bottom: 2px;
  }
  .stat .value {
    display: block;
    font-size: 20px;
    font-weight: 700;
  }
  .content {
    padding: 20px 24px 24px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 140px 140px 140px;
    gap: 12px;
    margin-bottom: 14px;
  }
  input, select, button {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    font-size: 16px;
    border: 1px solid #cbd5e1;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
  }
  button {
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover {
    background: #1d4ed8;
  }
  .secondary {
    background: #e2e8f0;
    color: #0f172a;
  }
  .secondary:hover {
    background: #cbd5e1;
  }
  .game-area {
    position: relative;
    height: 600px;
    overflow: hidden;
    border-radius: 20px;
    border: 2px solid #dbeafe;
    background:
      radial-gradient(circle at top, rgba(191,219,254,0.65), rgba(255,255,255,0) 35%),
      linear-gradient(180deg, #f8fbff 0%, #eff6ff 100%);
  }
  .grid-lines {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(to bottom, rgba(15,23,42,0.04) 1px, transparent 1px);
    background-size: 100% 46px;
    pointer-events: none;
  }
  .danger-line {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 64px;
    border-top: 3px dashed #ef4444;
    z-index: 1;
    pointer-events: none;
  }
  .floor {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 64px;
    background: #fee2e2;
    border-top: 2px solid #ef4444;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #991b1b;
    z-index: 1;
    pointer-events: none;
  }
  .word {
    position: absolute;
    padding: 9px 14px;
    border-radius: 999px;
    background: #111827;
    color: white;
    font-weight: 700;
    white-space: nowrap;
    user-select: none;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.24);
    z-index: 2;
  }
  .message {
    min-height: 26px;
    margin-top: 12px;
    font-size: 15px;
    color: #334155;
  }
  .footer-note {
    margin-top: 10px;
    font-size: 13px;
    color: #64748b;
    line-height: 1.5;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.84);
    backdrop-filter: blur(2px);
    padding: 24px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }
  .overlay-card {
    background: white;
    max-width: 520px;
    border-radius: 22px;
    padding: 28px;
    box-shadow: 0 14px 34px rgba(15,23,42,0.15);
  }
  .overlay-card h2 {
    margin: 0 0 10px;
    font-size: 28px;
  }
  .overlay-card p {
    margin: 8px 0;
    line-height: 1.55;
  }
  .ending-text {
    font-size: 20px;
    font-weight: 800;
    margin: 16px 0 !important;
  }
  @media (max-width: 900px) {
    .controls {
      grid-template-columns: 1fr 1fr;
    }
    .stats {
      grid-template-columns: repeat(3, minmax(88px, 1fr));
    }
  }
  @media (max-width: 640px) {
    .controls {
      grid-template-columns: 1fr;
    }
    .stats {
      grid-template-columns: repeat(2, minmax(88px, 1fr));
    }
    .header {
      padding: 18px;
    }
    .content {
      padding: 16px;
    }
    .game-area {
      height: 520px;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-wrap">
      <h1>의류벤더 용어 타자 연습</h1>
      <p>의류 OEM 벤더 실무 용어 연습용 · 1000개 이상 단어 풀 · 레벨/속도 증가 · 엔딩 시스템</p>
    </div>
    <div class="stats">
      <div class="stat"><span class="label">점수</span><span class="value" id="score">0</span></div>
      <div class="stat"><span class="label">목숨</span><span class="value" id="lives">5</span></div>
      <div class="stat"><span class="label">성공</span><span class="value" id="cleared">0</span></div>
      <div class="stat"><span class="label">레벨</span><span class="value" id="level">1</span></div>
      <div class="stat"><span class="label">최고점수</span><span class="value" id="highScore">0</span></div>
      <div class="stat"><span class="label">단어 수</span><span class="value" id="wordCount">0</span></div>
    </div>
  </div>

  <div class="content">
    <div class="controls">
      <input id="typingInput" type="text" placeholder="떨어지는 단어를 입력하고 Enter를 누르세요" autocomplete="off" />
      <select id="difficulty">
        <option value="easy">쉬움</option>
        <option value="normal" selected>보통</option>
        <option value="hard">어려움</option>
      </select>
      <button id="startBtn" type="button">시작 / 다시시작</button>
      <button id="pauseBtn" type="button" class="secondary">일시정지</button>
    </div>

    <div class="game-area" id="gameArea">
      <div class="grid-lines"></div>
      <div class="danger-line"></div>
      <div class="floor">여기까지 내려오면 목숨이 줄어듭니다</div>
      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h2>게임 준비</h2>
          <p>시작 버튼을 누르면 의류 벤더 용어가 위에서 떨어집니다.</p>
          <p>정확히 입력하고 <b>Enter</b>를 누르면 제거됩니다.</p>
        </div>
      </div>
    </div>

    <div class="message" id="message"></div>
    <div class="footer-note">
      점수가 오를수록 레벨이 올라가고 단어가 더 자주, 더 빠르게 떨어집니다. 게임 종료 시 점수에 따라 현실적인 배드 엔딩 또는 칭찬형 굿 엔딩이 랜덤으로 표시됩니다.
    </div>
  </div>
</div>

    "생산 라인에 병목이 발생했습니다",
    "납기 압박이 시작되었습니다",
    "바이어가 납기 확인 메일을 보냈습니다",
    "긴급 회의가 소집되었습니다",
    "생산 수율이 떨어지고 있습니다",
    "품질 이슈 보고가 접수되었습니다",
    "원단 롤에서 결점이 발견되었습니다",
    "생산 목표가 상향되었습니다",
    "추가 생산이 요청되었습니다",
    "출하 전 검사가 강화되었습니다",
    "긴급 생산 일정이 잡혔습니다",
    "생산팀에서 도움을 요청했습니다",
    "바이어가 현장 방문을 예고했습니다",
    "긴급 상황 보고서를 작성해야 합니다"
  ];

  const GOOD_ENDINGS = [
    "바이어가 당신의 대응을 높게 평가했습니다",
    "생산 라인이 안정적으로 운영되었습니다",
    "샘플이 한 번에 승인되었습니다",
    "마카 효율이 목표치를 초과했습니다",
    "바이어가 추가 오더를 요청했습니다",
    "공장이 당신의 관리 능력을 칭찬했습니다",
    "납기를 완벽하게 맞췄습니다",
    "품질 검사에서 전량 합격했습니다",
    "라인 효율이 최고 기록을 달성했습니다",
    "당신의 보고서가 모범 사례로 공유되었습니다"
  ];

  const SETTINGS = {
    easy: { spawn: 1500, smin: 0.35, smax: 0.75 },
    normal: { spawn: 1100, smin: 0.55, smax: 1.0 },
    hard: { spawn: 800, smin: 0.85, smax: 1.35 }
  };

  const gameArea = document.getElementById('gameArea');
  const input = document.getElementById('typingInput');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const difficulty = document.getElementById('difficulty');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const clearedEl = document.getElementById('cleared');
  const levelEl = document.getElementById('level');
  const highScoreEl = document.getElementById('highScore');
  const wordCountEl = document.getElementById('wordCount');
  const overlay = document.getElementById('overlay');
  const messageEl = document.getElementById('message');

  wordCountEl.textContent = WORDS.length;

  let words = [];
  let score = 0;
  let lives = 5;
  let cleared = 0;
  let running = false;
  let paused = false;
  let last = 0;
  let spawnTimer = 0;
  let anim = null;

  let highScore = Number(localStorage.getItem('vendor_typing_highscore') || 0);
  highScoreEl.textContent = highScore;

  function rand(min, max) { return Math.random() * (max - min) + min; }
  function pick() { return WORDS[Math.floor(Math.random() * WORDS.length)]; }
  function getLevel() { return Math.floor(score / 100) + 1; }

  function updateStats() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    clearedEl.textContent = cleared;
    levelEl.textContent = getLevel();
  }

  function msg(t) { messageEl.textContent = t; }

  function createWord() {
    const text = pick();
    const el = document.createElement('div');
    el.className = 'word';
    el.textContent = text;
    gameArea.appendChild(el);

    const maxLeft = Math.max(20, gameArea.clientWidth - el.offsetWidth - 20);
    const speedMultiplier = 1 + (getLevel() - 1) * 0.15;

    const item = {
      text,
      x: rand(10, maxLeft),
      y: 10,
      speed: rand(SETTINGS[difficulty.value].smin, SETTINGS[difficulty.value].smax) * speedMultiplier,
      el
    };

    el.style.left = item.x + 'px';
    el.style.top = item.y + 'px';
    words.push(item);
  }

  function removeWord(w) {
    w.el.remove();
    words = words.filter(x => x !== w);
  }

  function normalize(t) { return t.trim().toLowerCase(); }

  function handle() {
    if (!running || paused) return;
    const typed = normalize(input.value);
    if (!typed) return;

    const match = words.find(w => normalize(w.text) === typed);

    if (match) {
      removeWord(match);
      score += 10;
      cleared++;
      updateStats();
      msg(`정답: ${match.text}`);
    } else {
      msg('일치 단어 없음');
    }

    input.value = '';
  }

  function pickEnding() {
    if (score >= 300) {
      return GOOD_ENDINGS[Math.floor(Math.random() * GOOD_ENDINGS.length)];
    }
    return BAD_ENDINGS[Math.floor(Math.random() * BAD_ENDINGS.length)];
  }

  function gameOver() {
    running = false;
    paused = false;
    pauseBtn.textContent = '일시정지';

    if (anim) cancelAnimationFrame(anim);

    if (score > highScore) {
      highScore = score;
      localStorage.setItem('vendor_typing_highscore', highScore);
      highScoreEl.textContent = highScore;
    }

    const ending = pickEnding();

    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="overlay-card">
        <h2>게임 종료</h2>
        <p class="ending-text">${ending}</p>
        <p>점수 ${score}</p>
        <p>레벨 ${getLevel()}</p>
        <p>다시 하려면 시작 / 다시시작 버튼을 누르세요.</p>
      </div>`;
  }

  function reset() {
    words.forEach(w => w.el.remove());
    words = [];
    score = 0;
    lives = 5;
    cleared = 0;
    spawnTimer = 0;
    last = 0;
    paused = false;

    updateStats();
    msg('');
    pauseBtn.textContent = '일시정지';

    overlay.style.display = 'none';
    overlay.innerHTML = '';
  }

  function loop(t) {
    if (!running || paused) return;

    if (!last) last = t;
    const delta = t - last;
    last = t;

    spawnTimer += delta;

    const set = SETTINGS[difficulty.value];
    const spawnDelay = set.spawn / (1 + (getLevel() - 1) * 0.1);

    if (spawnTimer > spawnDelay) {
      createWord();
      spawnTimer = 0;
    }

    const floor = gameArea.clientHeight - 64;

    for (const w of [...words]) {
      w.y += w.speed * (delta / 16);
      w.el.style.top = w.y + 'px';

      if (w.y + w.el.offsetHeight >= floor) {
        removeWord(w);
        lives--;
        updateStats();

        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    }

    anim = requestAnimationFrame(loop);
  }

  startBtn.onclick = function () {
    reset();
    running = true;
    createWord();
    input.focus();
    anim = requestAnimationFrame(loop);
  };

  pauseBtn.onclick = function () {
    if (!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '재개' : '일시정지';
    if (!paused) {
      last = 0;
      anim = requestAnimationFrame(loop);
      input.focus();
    }
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handle();
    }
  });

  updateStats();
</script>
</body>
</html>
