<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>의류벤더 용어 타자 연습</title>

<style>
body{
  font-family:Arial, "Malgun Gothic", sans-serif;
  background:#f0f4ff;
  text-align:center;
  margin:0;
  padding:0;
}

h1{
  margin-top:20px;
}

#game{
  width:900px;
  height:500px;
  margin:20px auto;
  border:2px solid #3b82f6;
  background:white;
  position:relative;
  overflow:hidden;
}

.word{
  position:absolute;
  background:#111;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
  white-space:nowrap;
}

#input{
  width:400px;
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  font-size:16px;
  margin:5px;
  cursor:pointer;
}

#stats{
  margin-top:10px;
  font-size:18px;
}

#timer{
  font-weight:bold;
  color:#1d4ed8;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.82);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  box-sizing:border-box;
  z-index:999;
}

.overlay-title{
  font-size:36px;
  font-weight:bold;
  margin-bottom:20px;
}

.overlay-message{
  font-size:28px;
  line-height:1.5;
  max-width:700px;
}
</style>
</head>

<body>

<h1>의류벤더 용어 타자 연습</h1>

<select id="difficulty">
  <option value="easy">쉬움</option>
  <option value="normal">보통</option>
  <option value="hard">어려움</option>
</select>

<button onclick="startGame()">시작</button>

<br><br>

<input id="input" placeholder="단어 입력 후 Enter">

<div id="stats">
  점수: <span id="score">0</span>
  목숨: <span id="life">5</span>
  남은시간: <span id="timer">60</span>초
</div>

<div id="game"></div>

<script>
const easyWords = [
  "공장","라인","원단","니트","우븐","데님","저지","메쉬","코튼","나일론",
  "린넨","체크","프린트","염색","패턴","마카","재단","봉제","검사","샘플",
  "출하","선적","납기","오더","바이어","벤더","단추","지퍼","라벨","자수",
  "워싱","마감","폴리백","카톤","행택","입고","출고","재고","자재","부자재",
  "세아상역","한세실업","약진앞으로통상","노브랜드이마트아님","풍인무역","리무역","서이무역","팬코","경승","한솔섬유",
  "sorry","dear","really sorry","thanks","죄송합니다","할말이 없습니다",
  "sorry","dear","really sorry","thanks","죄송합니다","할말이 없습니다",
  "sorry","dear","really sorry","thanks","죄송합니다","할말이 없습니다",
  "늦어져서 죄송합니다","앞으로 빨리 제출하겠습니다","퀵기사님출발했습니다",
  "트림","벨크로","스냅","바코드","ERP","SCM","MES","생산","품질","불량"
];

const normalWords = [
  "재단요척","미니마카효율","스타일넘버","생산계획","생산스케줄","리드타임",
  "생산관리","생산공정","생산지시","현장관리","오더수량","오더변경",
  "원단불량","원단오염","원단검사","컬러승인","수축률","색상견뢰도",
  "마찰견뢰도","세탁견뢰도","필링","인장강도","혼용률","랩딥",
  "패턴제작","패턴수정","그레이딩","마카효율","패턴마킹","사이즈셋",
  "치수표","실측","시접","재단선","패턴승인","샘플패턴",
  "자수위치","프린트위치","포켓위치","네크라인","암홀","밑단",
  "소매장","총장","허리심","프로토샘플","핏샘플","세일즈샘플",
  "승인샘플","PP샘플","TOP샘플","SMS","피팅","인라인검사",
  "허리너비","가슴너비","바디렝스","센터백","센터프론트","고다찌",
  "최종검사","AQL검사","품질관리","품질이슈","품질클레임"
];

const hardWords = [
  "Fabric","Fiber","Yarn","Woven","Knit","Plain Weave","Twill","Satin",
  "Denim","Jersey","Rib","Interlock","Mesh","Fleece","Velvet","Spandex",
  "Cotton","Polyester","Nylon","Rayon","Wool","Silk","Linen",
  "Fabric Weight","Thickness","e-band","Shrinkage","Pilling grade",
  "Lab Dip","Color Fastness","Wash Fastness","Rubbing Fastness",
  "Fabric Inspection","Fabric Defect","Fabric Roll",
  "Pattern Making","Pattern Grading","Pattern Adjustment",
  "Marker Efficiency","Fabric Consumption",
  "Production Line","Production Plan","Production Schedule",
  "Inline Inspection","Final Inspection","Quality Control",
  "WIP","ERP","Quality Control",
  "Garment"
];

const failMessages = [
  "실패했기 때문에 진급이 누락되었습니다ㅋ",
  "실패했기때문에 바이어가 내일 방문한다고합니다ㅋ",
  "바이어가 치팅한것을 알아차렸습니다ㅋ",
  "베슬이 딜레이되었습니다ㅋ",
  "당신의 사전원가 결재가 반려되었습니다ㅋ",
  "원단테스트가 fail되었습니다ㅎ",
  "실패했기 때문에 바이어가 추가오더를 주었습니다ㅎㅎㅎ"
];

const successMessages = [
  "바이어가 오더를 취소했습니다",
  "내일은 바이어가 쉬는 날입니다",
  "진급 발표명단에 당신이 있습니다"
];

let words = [];
let score = 0;
let life = 5;
let running = false;

let spawnInterval = null;
let timerInterval = null;
let remainingTime = 60;

function getWords(){
  const diff = document.getElementById("difficulty").value;

  if(diff === "easy") return easyWords;
  if(diff === "normal") return normalWords;

  return [...easyWords, ...normalWords, ...hardWords];
}

function getSpawnSpeed(){
  const diff = document.getElementById("difficulty").value;

  if(diff === "easy") return 2300;
  if(diff === "normal") return 1800;
  return 1300;
}

function getFallSpeed(){
  const diff = document.getElementById("difficulty").value;

  if(diff === "easy") return 0.55;
  if(diff === "normal") return 0.8;
  return 1.1;
}

function spawnWord(){
  if(!running) return;

  const list = getWords();
  const text = list[Math.floor(Math.random()*list.length)];

  const div = document.createElement("div");
  div.className = "word";
  div.innerText = text;

  const maxLeft = 900 - 120;
  div.style.left = Math.max(0, Math.random()*maxLeft) + "px";
  div.style.top = "0px";

  document.getElementById("game").appendChild(div);

  words.push({
    el: div,
    text: text,
    y: 0
  });
}

function showEndScreen(title, message){
  const game = document.getElementById("game");

  const screen = document.createElement("div");
  screen.className = "overlay";
  screen.innerHTML = `
    <div class="overlay-title">${title}</div>
    <div class="overlay-message">${message}</div>
  `;

  game.appendChild(screen);
}

function endGame(isSuccess){
  running = false;

  clearInterval(spawnInterval);
  clearInterval(timerInterval);

  const msgList = isSuccess ? successMessages : failMessages;
  const msg = msgList[Math.floor(Math.random()*msgList.length)];

  if(isSuccess){
    showEndScreen("성공", msg);
  }else{
    showEndScreen("실패", msg);
  }
}

function update(){
  if(!running) return;

  const fallSpeed = getFallSpeed();

  for(let i = words.length - 1; i >= 0; i--){
    let w = words[i];

    w.y += fallSpeed;
    w.el.style.top = w.y + "px";

    if(w.y > 460){
      w.el.remove();
      words.splice(i, 1);

      life--;
      document.getElementById("life").innerText = life;

      if(life <= 0){
        endGame(false);
        return;
      }
    }
  }

  requestAnimationFrame(update);
}

function startGame(){
  clearInterval(spawnInterval);
  clearInterval(timerInterval);

  document.getElementById("game").innerHTML = "";
  words = [];
  score = 0;
  life = 5;
  remainingTime = 60;

  document.getElementById("score").innerText = score;
  document.getElementById("life").innerText = life;
  document.getElementById("timer").innerText = remainingTime;

  running = true;

  spawnWord();
  spawnInterval = setInterval(spawnWord, getSpawnSpeed());

  timerInterval = setInterval(function(){
    if(!running) return;

    remainingTime--;
    document.getElementById("timer").innerText = remainingTime;

    if(remainingTime <= 0){
      endGame(true);
    }
  }, 1000);

  update();

  document.getElementById("input").focus();
}

document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const val = this.value.trim().toLowerCase();

    for(let i = 0; i < words.length; i++){
      if(words[i].text.toLowerCase() === val){
        words[i].el.remove();
        words.splice(i, 1);

        score += 10;
        document.getElementById("score").innerText = score;
        break;
      }
    }

    this.value = "";
  }
});
</script>

</body>
</html>
